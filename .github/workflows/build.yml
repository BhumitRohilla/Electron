name: Build Electron App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Pillow for icon generation
        run: pip install pillow

      - name: Generate Windows icon from PNG
        shell: python
        run: |
          from PIL import Image
          import io, struct
          img = Image.open('assets/icon.png').convert('RGBA')
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for s in sizes:
              buf = io.BytesIO()
              img.resize((s, s), Image.LANCZOS).save(buf, format='PNG')
              images.append(buf.getvalue())
          n = len(images)
          header = struct.pack('<HHH', 0, 1, n)
          dir_offset = 6 + n * 16
          dirs, data, offset = b'', b'', dir_offset
          for s, raw in zip(sizes, images):
              w = s if s < 256 else 0
              dirs += struct.pack('<BBBBHHII', w, w, 0, 0, 1, 32, len(raw), offset)
              data += raw
              offset += len(raw)
          with open('assets/icon.ico', 'wb') as f:
              f.write(header + dirs + data)
          print('icon.ico written with sizes:', sizes)

      - name: Build Windows app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn
          retention-days: 30

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon from PNG
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512 1024; do
            sips -z $size $size assets/icon.png --out assets/icon.iconset/icon_${size}x${size}.png
          done
          for size in 16 32 64 128 256 512; do
            double=$((size * 2))
            sips -z $double $double assets/icon.png --out assets/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/*
            artifacts/macos-build/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
