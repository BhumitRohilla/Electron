<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Protected App</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #1a1a2e;
        color: #eaeaea;
      }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; }
      p { color: #aaa; }
      .badge {
        margin-top: 1rem;
        padding: 0.4rem 1rem;
        background: #e94560;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Protected Window</h1>
    <p>This window is hidden from screen recordings and screenshots.</p>
    <div class="badge">Content Protection ON</div>
  </body>
</html>
